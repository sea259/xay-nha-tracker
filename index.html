<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1565C0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Xây Nhà Q12">
    <meta name="description" content="Theo dõi chi phí xây nhà Quận 12, TPHCM">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Xây Nhà Q12 - Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>XÂY NHÀ Q12 - TRACKER</h1>
        </header>

        <main class="app-content">
            <div id="page-dashboard" class="page active"></div>
            <div id="page-payments" class="page"></div>
            <div id="page-expenses" class="page"></div>
            <div id="page-progress" class="page"></div>
            <div id="page-finance" class="page"></div>
            <div id="page-inspect" class="page"></div>
        </main>

        <!-- Bottom Tabs -->
        <nav class="bottom-tabs">
            <button class="tab-btn active" data-tab="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Tổng quan</span>
            </button>
            <button class="tab-btn" data-tab="payments">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                <span>Thanh toán</span>
            </button>
            <button class="tab-btn" data-tab="expenses">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span>Phát sinh</span>
            </button>
            <button class="tab-btn" data-tab="progress">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Tiến độ</span>
            </button>
            <button class="tab-btn" data-tab="finance">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Tài chính</span>
            </button>
            <button class="tab-btn" data-tab="inspect">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <span>Giám sát</span>
            </button>
        </nav>

        <!-- FAB -->
        <button id="fab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </div>

    <!-- Modals -->
    <div id="modal-payment" class="modal-overlay">
        <div class="modal-content"></div>
    </div>
    <div id="modal-expense" class="modal-overlay">
        <div class="modal-content"></div>
    </div>
    <div id="modal-progress" class="modal-overlay">
        <div class="modal-content"></div>
    </div>
    <div id="modal-finance" class="modal-overlay">
        <div class="modal-content"></div>
    </div>
    <div id="modal-sync" class="modal-overlay">
        <div class="modal-content"></div>
    </div>

    <script src="db.js"></script>
    <script src="sync.js"></script>
    <script src="inspect.js"></script>
    <script src="app.js"></script>
</body>
</html>
