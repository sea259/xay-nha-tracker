<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1565C0"/>
  <g transform="translate(256, 240)">
    <!-- House body -->
    <rect x="-100" y="-20" width="200" height="140" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <!-- Roof -->
    <polygon points="-130,0 0,-100 130,0" fill="#FFFFFF" opacity="0.95"/>
    <!-- Door -->
    <rect x="-25" y="50" width="50" height="70" rx="4" fill="#1565C0" opacity="0.6"/>
    <!-- Window left -->
    <rect x="-80" y="20" width="40" height="35" rx="4" fill="#42A5F5" opacity="0.7"/>
    <!-- Window right -->
    <rect x="40" y="20" width="40" height="35" rx="4" fill="#42A5F5" opacity="0.7"/>
    <!-- Chimney -->
    <rect x="50" y="-80" width="25" height="50" rx="3" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <!-- VND text -->
  <text x="256" y="420" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="48" font-weight="bold" opacity="0.9">VND</text>
</svg>
